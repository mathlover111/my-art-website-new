<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糰子牛奶的作品集</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary-color: #0973d6;
  --accent-color: #4facfe;
  --bg-glass: rgba(255, 255, 255, 0.85);
  --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
}

body {
  background-image: url('background.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: 'Noto Sans TC', Arial, sans-serif;
  text-align: center;
  color: #333;
  margin: 0;
  line-height: 1.6;
}

h1 {
  padding-top: 60px;
  color: white;
  font-size: 2.5rem;
  letter-spacing: 2px;
  text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  margin-bottom: 40px;
}

/* 管理員面板美化 */
#adminPanel {
  display: none;
  margin: 20px auto;
  padding: 25px;
  width: 85%;
  max-width: 600px;
  background: var(--bg-glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: var(--shadow);
}

#adminPanel h3 { margin-top: 0; color: var(--primary-color); }

input[type="text"] {
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 10px;
  transition: 0.3s;
  outline: none;
}

input[type="text"]:focus { border-color: var(--accent-color); }

button {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  margin: 5px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  filter: brightness(1.1);
}

/* 圖片展示區 */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.img-item {
  background: var(--bg-glass);
  padding: 10px;
  border-radius: 15px;
  box-shadow: var(--shadow);
  transition: 0.3s;
}

.img-item:hover { transform: translateY(-5px); }

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

/* 放大視窗 */
#imageModal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(5px);
  justify-content: center;
  align-items: center;
}

#modalImg {
  max-width: 90%;
  max-height: 85%;
  border-radius: 10px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes zoomIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* 留言區美化 */
.comment-box {
  margin: 50px auto 120px;
  width: 90%;
  max-width: 700px;
  background: var(--bg-glass);
  padding: 30px;
  border-radius: 20px;
  box-shadow: var(--shadow);
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 12px;
  padding: 15px;
  border: 1px solid #ddd;
  font-family: inherit;
  resize: none;
  box-sizing: border-box;
  margin-bottom: 10px;
}

/* 浮動留言列表 */
#commentList {
  position: fixed;
  bottom: 25px;
  left: 20px;
  width: 280px;
  max-height: 350px;
  overflow-y: auto;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: left;
  border: 1px solid rgba(255,255,255,0.5);
}

/* 自訂捲軸 */
#commentList::-webkit-scrollbar { width: 5px; }
#commentList::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

#commentList p {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  border-left: 4px solid var(--primary-color);
}

.delete-btn {
  background: #ff4d4d;
  padding: 2px 8px;
  font-size: 11px;
  border-radius: 5px;
}

.del-img-btn {
  margin-top: 10px;
  background: #ff4d4d;
  width: 100%;
}
</style>
</head>

<body>

<h1>糰子牛奶的畫畫作品 🎨</h1>

<div id="imageModal" onclick="this.style.display='none'">
  <img id="modalImg" src="">
</div>

<div id="adminPanel">
  <h3>🛠️ 管理員控制台</h3>
  <input type="text" id="imgUrlInput" placeholder="請貼上圖片連結..." style="width:70%;">
  <button onclick="addImage()">新增圖片</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="comment-box">
  <h2 style="color:var(--primary-color)">💬 訪客留言</h2>
  <textarea id="commentInput" placeholder="喜歡這些作品嗎？留個言讓我知道吧！✨"></textarea>
  <div>
    <button onclick="addComment()">發佈留言</button>
    <button onclick="login()" style="background: white; color: #444; border: 1px solid #ddd;">Google 快速登入</button>
  </div>
</div>

<div id="commentList">
  <div style="font-weight: bold; margin-bottom: 10px; color: var(--primary-color); border-bottom: 1px solid #eee; padding-bottom: 5px;">最新動態</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyCstAO_LlkU9hm1L2-1R1k8KpvPcnDuULI",
  authDomain: "myprogram-476fd.firebaseapp.com",
  databaseURL: "https://myprogram-476fd-default-rtdb.firebaseio.com",
  projectId: "myprogram-476fd",
  storageBucket: "myprogram-476fd.appspot.com",
  messagingSenderId: "292155592104",
  appId: "1:292155592104:web:45788da74aa7986b56e19d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = null;
const adminID = "PrQ5SswIOBWWRCAFU6pz8mTpVjp1";

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.uid;
    if(currentUser === adminID) document.getElementById('adminPanel').style.display = 'block';
  } else {
    currentUser = null;
    document.getElementById('adminPanel').style.display = 'none';
  }
  // 清除列表重新載入以更新刪除按鈕權限
  const list = document.getElementById("commentList");
  const header = list.firstElementChild;
  list.innerHTML = "";
  list.appendChild(header);
  loadComments();
});

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(err => alert("登入失敗: " + err.message));
}

function loadImages(){
  db.ref("images").on("value", snap => {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";
    snap.forEach(child => {
      const url = child.val();
      const id = child.key;
      const div = document.createElement("div");
      div.className = "img-item";
      
      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        modal.style.display = "flex";
        modalImg.src = url;
      };

      div.appendChild(img);

      if(currentUser === adminID) {
        const delBtn = document.createElement("button");
        delBtn.className = "del-img-btn";
        delBtn.textContent = "🗑️ 刪除作品";
        delBtn.onclick = (e) => { 
          e.stopPropagation();
          if(confirm("確定刪除這張作品？")) db.ref("images/" + id).remove(); 
        };
        div.appendChild(delBtn);
      }
      gallery.appendChild(div);
    });
  });
}

function addImage(){
  const input = document.getElementById("imgUrlInput");
  const url = input.value.trim();
  if(!url || currentUser !== adminID) return;
  db.ref("images").once("value", snap => {
    if(snap.numChildren() >= 10) return alert("已達 10 張上限");
    db.ref("images").push(url).then(() => { input.value = ""; });
  });
}

function loadComments(){
  const list = document.getElementById("commentList");
  db.ref("comments").on("child_added", snap => {
    const data = snap.val();
    const id = snap.key;
    if(document.getElementById("msg-" + id)) return;
    
    const p = document.createElement("p");
    p.id = "msg-" + id;
    const date = new Date(data.time);
    const timeText = (date.getMonth()+1)+"/"+date.getDate()+" "+date.getHours()+":"+(date.getMinutes()<10?'0':'')+date.getMinutes();
    
    p.innerHTML = `<div><strong>${data.name}</strong><br>${data.text} <br><small style="color:#999">${timeText}</small></div>`;
    
    if(data.user === currentUser || currentUser === adminID){
      const btn = document.createElement("button");
      btn.textContent = "刪除";
      btn.className = "delete-btn";
      btn.onclick = () => db.ref("comments/"+id).remove();
      p.appendChild(btn);
    }
    list.appendChild(p);
    list.scrollTop = list.scrollHeight;
  });
  db.ref("comments").on("child_removed", snap => {
    const element = document.getElementById("msg-" + snap.key);
    if(element) element.remove();
  });
}

function addComment(){
  if(!currentUser) return alert("請先登入後再發表評論喔！");
  const input = document.getElementById("commentInput");
  const text = input.value.trim();
  if(!text) return;
  db.ref("comments").push({
    text: text,
    user: currentUser,
    name: firebase.auth().currentUser.displayName,
    time: Date.now()
  });
  input.value = "";
}

loadImages();
</script>
</body>
</html>
