<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>糰子牛奶的作品集</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  background-image: url('background.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: 'Noto Sans TC', Arial, sans-serif;
  text-align: center;
  color: white; /* 為了對應你的暗色背景，基礎文字改白色 */
  margin: 0;
}

h1 {
  padding-top: 50px;
  font-size: 2.5rem;
  color: #ffffff;
  text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.8);
}

h2 {
  color: #4facfe;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

/* 管理員面板 */
#adminPanel {
  display: none;
  margin: 20px auto;
  padding: 20px;
  width: 90%;
  max-width: 600px;
  border: 2px dashed #4facfe;
  background: rgba(255, 255, 255, 0.9);
  color: #333;
  border-radius: 15px;
}

/* 圖片區塊 - 確保有空間顯示 */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin: 30px auto;
  min-height: 200px; /* 保底高度 */
  max-width: 1200px;
}

.img-item {
  margin: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.3s;
}

.img-item:hover { transform: translateY(-5px); }

.gallery img {
  width: 250px;
  max-width: 80vw;
  height: 180px;
  object-fit: cover; /* 讓不同比例的圖看起來整齊 */
  border-radius: 12px;
  border: 3px solid white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  cursor: pointer;
}

/* 放大功能 */
#imageModal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  justify-content: center;
  align-items: center;
  cursor: zoom-out;
}

#modalImg {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
  animation: zoomIn 0.3s;
}

@keyframes zoomIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* 留言區美化 */
.comment-box {
  margin: 50px auto 150px;
  width: 90%;
  max-width: 600px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
}

textarea {
  width: 100%;
  height: 80px;
  border-radius: 10px;
  padding: 12px;
  border: none;
  font-family: inherit;
  font-size: 16px;
}

button {
  padding: 10px 25px;
  border-radius: 20px;
  border: none;
  background: #0973d6;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
  transition: 0.3s;
}

button:hover { background: #4facfe; }

#commentList {
  position: fixed; bottom: 20px; left: 15px; width: 260px; max-height: 300px;
  overflow-y: auto; background: rgba(255, 255, 255, 0.95); padding: 15px;
  border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: left;
  color: #333;
}

#commentList p {
  background: #f8f9fa;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  font-size: 14px;
  border-left: 4px solid #0973d6;
}

.del-img-btn { background: #ff4d4d; font-size: 12px; margin-top: 8px; }
.delete-btn { background: #ff4444; padding: 2px 6px; border-radius: 4px; }
</style>
</head>

<body>

<h1>糰子牛奶的畫畫作品 🎨</h1>

<div id="imageModal" onclick="this.style.display='none'">
  <img id="modalImg" src="">
</div>

<div id="adminPanel">
  <h3>🛠️ 管理員控制台 (上限 10 張)</h3>
  <input type="text" id="imgUrlInput" placeholder="貼上圖片原始連結">
  <button onclick="addImage()">新增圖片</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="comment-box">
  <h2>💬 留言區</h2>
  <textarea id="commentInput" placeholder="來都來了，寫點評論吧😉"></textarea>
  <br><br>
  <button onclick="addComment()">送出留言</button>
  <button onclick="login()" style="background:rgba(255,255,255,0.2); border:1px solid white;">Google 登入</button>
  <div id="commentList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCstAO_LlkU9hm1L2-1R1k8KpvPcnDuULI",
  authDomain: "myprogram-476fd.firebaseapp.com",
  databaseURL: "https://myprogram-476fd-default-rtdb.firebaseio.com",
  projectId: "myprogram-476fd",
  storageBucket: "myprogram-476fd.appspot.com",
  messagingSenderId: "292155592104",
  appId: "1:292155592104:web:45788da74aa7986b56e19d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = null;
const adminID = "PrQ5SswIOBWWRCAFU6pz8mTpVjp1";

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.uid;
    if(currentUser === adminID) document.getElementById('adminPanel').style.display = 'block';
  } else {
    currentUser = null;
    document.getElementById('adminPanel').style.display = 'none';
  }
  document.getElementById("commentList").innerHTML = "";
  loadComments();
});

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(err => alert("登入失敗: " + err.message));
}

function loadImages(){
  db.ref("images").on("value", snap => {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";
    snap.forEach(child => {
      const url = child.val();
      const id = child.key;
      const div = document.createElement("div");
      div.className = "img-item";
      
      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        modal.style.display = "flex";
        modalImg.src = url;
      };

      div.appendChild(img);
      if(currentUser === adminID) {
        const delBtn = document.createElement("button");
        delBtn.className = "del-img-btn";
        delBtn.textContent = "刪除圖片";
        delBtn.onclick = (e) => { 
          e.stopPropagation();
          if(confirm("確定刪除？")) db.ref("images/" + id).remove(); 
        };
        div.appendChild(delBtn);
      }
      gallery.appendChild(div);
    });
  });
}

function addImage(){
  const input = document.getElementById("imgUrlInput");
  const url = input.value.trim();
  if(!url || currentUser !== adminID) return;
  db.ref("images").once("value", snap => {
    if(snap.numChildren() >= 10) return alert("已達 10 張上限");
    db.ref("images").push(url).then(() => { input.value = ""; alert("新增成功"); });
  });
}

function loadComments(){
  const list = document.getElementById("commentList");
  db.ref("comments").on("child_added", snap => {
    const data = snap.val();
    const id = snap.key;
    if(document.getElementById("msg-" + id)) return;
    const p = document.createElement("p");
    p.id = "msg-" + id;
    const date = new Date(data.time);
    const timeText = (date.getMonth()+1)+"/"+date.getDate()+" "+date.getHours()+":"+(date.getMinutes()<10?'0':'')+date.getMinutes();
    p.innerHTML = `<span style="display:block"><b>${data.name}</b>: ${data.text}<br><small style="color:#888">${timeText}</small></span>`;
    if(data.user === currentUser || currentUser === adminID){
      const btn = document.createElement("button");
      btn.textContent = "刪";
      btn.className = "delete-btn";
      btn.onclick = () => db.ref("comments/"+id).remove();
      p.appendChild(btn);
    }
    list.appendChild(p);
    list.scrollTop = list.scrollHeight;
  });
  db.ref("comments").on("child_removed", snap => {
    const element = document.getElementById("msg-" + snap.key);
    if(element) element.remove();
  });
}

function addComment(){
  if(!currentUser) return alert("請先登入！");
  const input = document.getElementById("commentInput");
  const text = input.value.trim();
  if(!text) return;
  db.ref("comments").push({
    text: text,
    user: currentUser,
    name: firebase.auth().currentUser.displayName,
    time: Date.now()
  });
  input.value = "";
}

loadImages();
</script>
</body>
</html>
